      <text x="339" y="322" class="accent">Schema</text>
      <text x="360" y="364" class="body">rules</text>
      <text x="334" y="398" class="small">enums + keys</text>
      <rect x="504" y="292" width="190" height="126" rx="26" class="chip"/>
      <text x="563" y="350" class="accent">Tables</text>
      <text x="598" y="392" class="body">links</text>
