<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" overflow="hidden" role="img" aria-labelledby="t d">
      <title id="t">One resource becomes a clean REST surface</title><desc id="d">A simple diagram showing how a resource becomes collection and item routes with method semantics and HTTP outcomes.</desc>
      <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

<style>
  .bg { fill: #0b1016; }
  .panel { fill: #151b22; stroke: #2c343d; stroke-width: 2; }
  .panel-soft { fill: #11161c; stroke: #27303a; stroke-width: 2; }
  .accent-panel { fill: #1b1013; stroke: #a50008; stroke-width: 2.5; }
  .chip { fill: #151b22; stroke: #46505b; stroke-width: 1.5; }
  .line { stroke: #f0f4fa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .line-muted { stroke: #8d97a2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
  .title { fill: #f4f7fb; font: 700 34px 'Segoe UI', Arial, sans-serif; }
  .body { fill: #e9eef5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
  .small { fill: #aab4bf; font: 500 18px 'Segoe UI', Arial, sans-serif; }
  .mono { fill: #f4f7fb; font: 700 20px Consolas, monospace; }
  .accent { fill: #ff9095; font: 700 16px Consolas, monospace; letter-spacing: 1px; text-transform: uppercase; }
</style>

      <rect class="bg" width="1200" height="760" rx="28"/>
      <text x="72" y="88" class="accent">Topic 11</text>
      <text x="72" y="140" class="title">One resource becomes a clean REST surface</text>

      <rect x="70" y="285" width="170" height="128" rx="26" class="panel"/>
      <text x="113" y="345" class="accent">Resource</text>
      <text x="126" y="388" class="body">project</text>
      <rect x="300" y="255" width="220" height="158" rx="28" class="chip"/>
      <text x="360" y="315" class="accent">Collection</text>
      <text x="340" y="360" class="mono">/projects</text>
      <text x="354" y="395" class="small">GET + POST</text>
      <rect x="580" y="255" width="220" height="158" rx="28" class="accent-panel"/>
      <text x="658" y="315" class="accent">Item</text>
      <text x="615" y="360" class="mono">/projects/{id}</text>
      <text x="617" y="395" class="small">GET PATCH DELETE</text>
      <rect x="860" y="255" width="220" height="158" rx="28" class="panel-soft"/>
      <text x="927" y="315" class="accent">Action</text>
      <text x="898" y="360" class="mono">POST /archive</text>
      <text x="915" y="395" class="small">custom behavior</text>
      <path d="M240 349 L300 334" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M520 334 L580 334" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M800 334 L860 334" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <rect x="290" y="535" width="620" height="88" rx="26" class="panel"/>
      <text x="510" y="582" class="accent">Outcomes</text>
      <text x="418" y="606" class="mono">200   201   204   404</text>

      </svg>