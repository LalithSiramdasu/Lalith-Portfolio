<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" overflow="hidden" role="img" aria-labelledby="t d">
      <title id="t">How two requests behave under different execution models</title><desc id="d">A three-column comparison showing blocking, concurrent, and parallel handling of two requests.</desc>
      <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

<style>
  .bg { fill: #0b1016; }
  .panel { fill: #151b22; stroke: #2c343d; stroke-width: 2; }
  .panel-soft { fill: #11161c; stroke: #27303a; stroke-width: 2; }
  .accent-panel { fill: #1b1013; stroke: #a50008; stroke-width: 2.5; }
  .chip { fill: #151b22; stroke: #46505b; stroke-width: 1.5; }
  .line { stroke: #f0f4fa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .line-muted { stroke: #8d97a2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
  .title { fill: #f4f7fb; font: 700 34px 'Segoe UI', Arial, sans-serif; }
  .body { fill: #e9eef5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
  .small { fill: #aab4bf; font: 500 18px 'Segoe UI', Arial, sans-serif; }
  .mono { fill: #f4f7fb; font: 700 20px Consolas, monospace; }
  .accent { fill: #ff9095; font: 700 16px Consolas, monospace; letter-spacing: 1px; text-transform: uppercase; }
</style>

      <rect class="bg" width="1200" height="760" rx="28"/>
      <text x="72" y="88" class="accent">Topic 22</text>
      <text x="72" y="140" class="title">How two requests behave under different execution models</text>

      <rect x="108" y="248" width="284" height="320" rx="30" class="panel"/>
      <text x="188" y="302" class="accent">Blocking</text>
      <rect x="144" y="344" width="212" height="56" rx="20" class="chip"/>
      <text x="218" y="378" class="small">Req A CPU</text>
      <rect x="144" y="420" width="212" height="56" rx="20" class="chip"/>
      <text x="224" y="454" class="small">Req A IO</text>
      <rect x="144" y="496" width="212" height="56" rx="20" class="panel-soft"/>
      <text x="218" y="530" class="small">Req B waits</text>

      <rect x="458" y="248" width="284" height="320" rx="30" class="accent-panel"/>
      <text x="520" y="302" class="accent">Concurrent</text>
      <rect x="494" y="344" width="212" height="56" rx="20" class="chip"/>
      <text x="568" y="378" class="small">Req A IO</text>
      <rect x="494" y="420" width="212" height="56" rx="20" class="panel"/>
      <text x="562" y="454" class="small">Req B runs</text>
      <rect x="494" y="496" width="212" height="56" rx="20" class="chip"/>
      <text x="556" y="530" class="small">One core shared</text>

      <rect x="808" y="248" width="284" height="320" rx="30" class="panel-soft"/>
      <text x="878" y="302" class="accent">Parallel</text>
      <rect x="844" y="344" width="212" height="56" rx="20" class="chip"/>
      <text x="916" y="378" class="small">Req A core 1</text>
      <rect x="844" y="420" width="212" height="56" rx="20" class="chip"/>
      <text x="916" y="454" class="small">Req B core 2</text>
      <rect x="844" y="496" width="212" height="56" rx="20" class="panel"/>
      <text x="895" y="530" class="small">same-time work</text>

      </svg>