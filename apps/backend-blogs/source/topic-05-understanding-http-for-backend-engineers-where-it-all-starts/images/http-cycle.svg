
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" overflow="hidden" role="img" aria-labelledby="t d">
<title id="t">HTTP cycle</title><desc id="d">A balanced HTTP request and response diagram.</desc>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

  <style>
    .bg { fill: #0b1016; }
    .panel { fill: #151b22; stroke: #2c343d; stroke-width: 2; }
    .panel-soft { fill: #11161c; stroke: #27303a; stroke-width: 2; }
    .accent-panel { fill: #1b1013; stroke: #a50008; stroke-width: 2.5; }
    .chip { fill: #151b22; stroke: #46505b; stroke-width: 1.5; }
    .line { stroke: #f0f4fa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .line-muted { stroke: #8d97a2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
    .title { fill: #f4f7fb; font: 700 34px 'Segoe UI', Arial, sans-serif; }
    .body { fill: #e9eef5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
    .small { fill: #aab4bf; font: 500 18px 'Segoe UI', Arial, sans-serif; }
    .mono { fill: #f4f7fb; font: 700 20px Consolas, monospace; }
    .accent { fill: #ff9095; font: 700 16px Consolas, monospace; letter-spacing: 1px; text-transform: uppercase; }
  </style>

<rect class="bg" width="1200" height="720" rx="28"/>
<text x="72" y="88" class="accent">Topic 5</text>
<text x="72" y="140" class="title">How HTTP moves a message</text>
<rect x="110" y="250" width="220" height="180" rx="30" class="panel"/>
<text x="178" y="322" class="body">Client</text>
<text x="160" y="370" class="small">browser or app</text>
<rect x="420" y="220" width="360" height="120" rx="28" class="accent-panel"/>
<text x="545" y="276" class="accent">Request</text>
<text x="500" y="322" class="body">method + path</text>
<rect x="420" y="390" width="360" height="120" rx="28" class="panel"/>
<text x="540" y="446" class="accent">Response</text>
<text x="478" y="492" class="body">status + payload</text>
<rect x="870" y="250" width="220" height="180" rx="30" class="panel-soft"/>
<text x="940" y="322" class="body">Server</text>
<text x="905" y="370" class="small">router, handler, data</text>
<path d="M330 340 L420 280" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
<path d="M780 450 L870 340" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
</svg>
