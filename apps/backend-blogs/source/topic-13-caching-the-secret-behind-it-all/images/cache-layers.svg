<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" overflow="hidden" role="img" aria-labelledby="t d">
      <title id="t">Requests get faster when hot data lives closer</title><desc id="d">A layered cache diagram showing user requests flowing through edge and application caches before reaching the database.</desc>
      <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

<style>
  .bg { fill: #0b1016; }
  .panel { fill: #151b22; stroke: #2c343d; stroke-width: 2; }
  .panel-soft { fill: #11161c; stroke: #27303a; stroke-width: 2; }
  .accent-panel { fill: #1b1013; stroke: #a50008; stroke-width: 2.5; }
  .chip { fill: #151b22; stroke: #46505b; stroke-width: 1.5; }
  .line { stroke: #f0f4fa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .line-muted { stroke: #8d97a2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
  .title { fill: #f4f7fb; font: 700 34px 'Segoe UI', Arial, sans-serif; }
  .body { fill: #e9eef5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
  .small { fill: #aab4bf; font: 500 18px 'Segoe UI', Arial, sans-serif; }
  .mono { fill: #f4f7fb; font: 700 20px Consolas, monospace; }
  .accent { fill: #ff9095; font: 700 16px Consolas, monospace; letter-spacing: 1px; text-transform: uppercase; }
</style>

      <rect class="bg" width="1200" height="760" rx="28"/>
      <text x="72" y="88" class="accent">Topic 13</text>
      <text x="72" y="140" class="title">Requests get faster when hot data lives closer</text>

      <rect x="60" y="302" width="190" height="126" rx="26" class="panel"/>
      <text x="124" y="360" class="accent">Client</text>
      <text x="136" y="402" class="body">request</text>
      <rect x="310" y="272" width="210" height="156" rx="28" class="chip"/>
      <text x="372" y="332" class="accent">Edge cache</text>
      <text x="358" y="374" class="body">CDN + DNS</text>
      <text x="379" y="408" class="small">nearest reuse</text>
      <rect x="580" y="272" width="210" height="156" rx="28" class="accent-panel"/>
      <text x="632" y="332" class="accent">App cache</text>
      <text x="653" y="374" class="body">Redis</text>
      <text x="631" y="408" class="small">hot keys + TTL</text>
      <rect x="850" y="302" width="230" height="126" rx="26" class="panel-soft"/>
      <text x="919" y="360" class="accent">Source</text>
      <text x="929" y="402" class="body">db or API</text>
      <path d="M250 365 L310 350" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M520 350 L580 350" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M790 350 L850 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <rect x="360" y="548" width="480" height="88" rx="24" class="panel"/>
      <text x="525" y="595" class="accent">Hit early</text>
      <text x="641" y="595" class="small">miss -> source</text>

      </svg>