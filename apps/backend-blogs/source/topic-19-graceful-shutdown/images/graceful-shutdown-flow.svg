<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" overflow="hidden" role="img" aria-labelledby="t d">
      <title id="t">A safe shutdown is a sequence, not a kill switch</title><desc id="d">A graceful shutdown diagram showing signal, stop intake, drain work, clean resources, and exit.</desc>
      <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

<style>
  .bg { fill: #0b1016; }
  .panel { fill: #151b22; stroke: #2c343d; stroke-width: 2; }
  .panel-soft { fill: #11161c; stroke: #27303a; stroke-width: 2; }
  .accent-panel { fill: #1b1013; stroke: #a50008; stroke-width: 2.5; }
  .chip { fill: #151b22; stroke: #46505b; stroke-width: 1.5; }
  .line { stroke: #f0f4fa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .line-muted { stroke: #8d97a2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
  .title { fill: #f4f7fb; font: 700 34px 'Segoe UI', Arial, sans-serif; }
  .body { fill: #e9eef5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
  .small { fill: #aab4bf; font: 500 18px 'Segoe UI', Arial, sans-serif; }
  .mono { fill: #f4f7fb; font: 700 20px Consolas, monospace; }
  .accent { fill: #ff9095; font: 700 16px Consolas, monospace; letter-spacing: 1px; text-transform: uppercase; }
</style>

      <rect class="bg" width="1200" height="760" rx="28"/>
      <text x="72" y="88" class="accent">Topic 19</text>
      <text x="72" y="140" class="title">A safe shutdown is a sequence, not a kill switch</text>

      <rect x="48" y="302" width="170" height="126" rx="26" class="panel"/>
      <text x="98" y="360" class="accent">Signal</text>
      <text x="88" y="402" class="body">SIGTERM</text>
      <rect x="262" y="302" width="180" height="126" rx="26" class="chip"/>
      <text x="299" y="360" class="accent">Stop intake</text>
      <text x="324" y="402" class="body">no new</text>
      <rect x="486" y="272" width="190" height="156" rx="28" class="accent-panel"/>
      <text x="551" y="332" class="accent">Drain</text>
      <text x="552" y="374" class="body">finish</text>
      <text x="540" y="408" class="small">or time out</text>
      <rect x="720" y="302" width="190" height="126" rx="26" class="panel"/>
      <text x="773" y="360" class="accent">Cleanup</text>
      <text x="769" y="402" class="body">release</text>
      <rect x="954" y="302" width="170" height="126" rx="26" class="panel-soft"/>
      <text x="1013" y="360" class="accent">Exit</text>
      <text x="1001" y="402" class="body">safe stop</text>
      <path d="M218 365 L262 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M442 365 L486 350" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M676 350 L720 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M910 365 L954 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>

      </svg>