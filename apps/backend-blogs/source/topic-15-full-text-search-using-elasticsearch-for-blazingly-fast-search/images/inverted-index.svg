<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" overflow="hidden" role="img" aria-labelledby="t d">
      <title id="t">Search is fast when terms lead the lookup</title><desc id="d">A simple search-engine diagram showing query lookup, matching documents, ranking, and final results.</desc>
      <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

<style>
  .bg { fill: #0b1016; }
  .panel { fill: #151b22; stroke: #2c343d; stroke-width: 2; }
  .panel-soft { fill: #11161c; stroke: #27303a; stroke-width: 2; }
  .accent-panel { fill: #1b1013; stroke: #a50008; stroke-width: 2.5; }
  .chip { fill: #151b22; stroke: #46505b; stroke-width: 1.5; }
  .line { stroke: #f0f4fa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .line-muted { stroke: #8d97a2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
  .title { fill: #f4f7fb; font: 700 34px 'Segoe UI', Arial, sans-serif; }
  .body { fill: #e9eef5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
  .small { fill: #aab4bf; font: 500 18px 'Segoe UI', Arial, sans-serif; }
  .mono { fill: #f4f7fb; font: 700 20px Consolas, monospace; }
  .accent { fill: #ff9095; font: 700 16px Consolas, monospace; letter-spacing: 1px; text-transform: uppercase; }
</style>

      <rect class="bg" width="1200" height="760" rx="28"/>
      <text x="72" y="88" class="accent">Topic 15</text>
      <text x="72" y="140" class="title">Search is fast when terms lead the lookup</text>

      <rect x="48" y="302" width="180" height="126" rx="26" class="panel"/>
      <text x="112" y="360" class="accent">Query</text>
      <text x="104" y="402" class="body">laptop</text>
      <rect x="280" y="272" width="210" height="156" rx="28" class="accent-panel"/>
      <text x="339" y="332" class="accent">Index</text>
      <text x="346" y="374" class="body">term map</text>
      <text x="313" y="408" class="small">inverted lookup</text>
      <rect x="542" y="302" width="190" height="126" rx="26" class="chip"/>
      <text x="596" y="360" class="accent">Candidates</text>
      <text x="616" y="402" class="body">doc set</text>
      <rect x="784" y="302" width="170" height="126" rx="26" class="panel"/>
      <text x="835" y="360" class="accent">Rank</text>
      <text x="830" y="402" class="body">BM25</text>
      <rect x="1006" y="302" width="146" height="126" rx="26" class="panel-soft"/>
      <text x="1038" y="360" class="accent">Results</text>
      <text x="1058" y="402" class="body">top</text>
      <path d="M228 365 L280 350" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M490 350 L542 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M732 365 L784 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M954 365 L1006 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <rect x="360" y="548" width="480" height="88" rx="24" class="panel"/>
      <text x="470" y="595" class="accent">Search quality</text>
      <text x="666" y="595" class="small">rank + typos</text>

      </svg>