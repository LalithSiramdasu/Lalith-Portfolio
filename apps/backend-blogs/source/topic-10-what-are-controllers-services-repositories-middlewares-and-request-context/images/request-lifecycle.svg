
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" overflow="hidden" role="img" aria-labelledby="t d">
<title id="t">Request lifecycle</title><desc id="d">A clean, aligned lifecycle diagram from middleware to database with request context below.</desc>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

  <style>
    .bg { fill: #0b1016; }
    .panel { fill: #151b22; stroke: #2c343d; stroke-width: 2; }
    .panel-soft { fill: #11161c; stroke: #27303a; stroke-width: 2; }
    .accent-panel { fill: #1b1013; stroke: #a50008; stroke-width: 2.5; }
    .chip { fill: #151b22; stroke: #46505b; stroke-width: 1.5; }
    .line { stroke: #f0f4fa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .line-muted { stroke: #8d97a2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
    .title { fill: #f4f7fb; font: 700 34px 'Segoe UI', Arial, sans-serif; }
    .body { fill: #e9eef5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
    .small { fill: #aab4bf; font: 500 18px 'Segoe UI', Arial, sans-serif; }
    .mono { fill: #f4f7fb; font: 700 20px Consolas, monospace; }
    .accent { fill: #ff9095; font: 700 16px Consolas, monospace; letter-spacing: 1px; text-transform: uppercase; }
  </style>

<rect class="bg" width="1200" height="760" rx="28"/>
<text x="72" y="88" class="accent">Topic 10</text>
<text x="72" y="140" class="title">A request moves through clear layers</text>
<rect x="70" y="305" width="180" height="120" rx="26" class="panel"/><text x="108" y="378" class="mono">Middleware</text>
<rect x="300" y="305" width="150" height="120" rx="26" class="chip"/><text x="334" y="378" class="mono">Handler</text>
<rect x="500" y="305" width="150" height="120" rx="26" class="accent-panel"/><text x="534" y="378" class="mono">Service</text>
<rect x="700" y="305" width="180" height="120" rx="26" class="chip"/><text x="736" y="378" class="mono">Repository</text>
<rect x="930" y="305" width="150" height="120" rx="26" class="panel-soft"/><text x="979" y="378" class="mono">DB</text>
<path d="M250 365 L300 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/><path d="M450 365 L500 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/><path d="M650 365 L700 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/><path d="M880 365 L930 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
<rect x="255" y="535" width="640" height="76" rx="24" class="panel"/><text x="330" y="582" class="accent">Request context</text><text x="525" y="582" class="small">userId, role, requestId, permissions</text>
</svg>
