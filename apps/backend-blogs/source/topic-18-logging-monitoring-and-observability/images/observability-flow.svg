      <path d="M600 334 L600 410" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M642 334 L950 410" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M304 536 L492 610" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M600 536 L600 610" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
