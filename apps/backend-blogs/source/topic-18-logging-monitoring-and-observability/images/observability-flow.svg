<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" overflow="hidden" role="img" aria-labelledby="t d">
      <title id="t">One request becomes three visibility signals</title><desc id="d">An observability diagram showing one request feeding logs, metrics, and traces, then converging in investigation.</desc>
      <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

<style>
  .bg { fill: #0b1016; }
  .panel { fill: #151b22; stroke: #2c343d; stroke-width: 2; }
  .panel-soft { fill: #11161c; stroke: #27303a; stroke-width: 2; }
  .accent-panel { fill: #1b1013; stroke: #a50008; stroke-width: 2.5; }
  .chip { fill: #151b22; stroke: #46505b; stroke-width: 1.5; }
  .line { stroke: #f0f4fa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .line-muted { stroke: #8d97a2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
  .title { fill: #f4f7fb; font: 700 34px 'Segoe UI', Arial, sans-serif; }
  .body { fill: #e9eef5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
  .small { fill: #aab4bf; font: 500 18px 'Segoe UI', Arial, sans-serif; }
  .mono { fill: #f4f7fb; font: 700 20px Consolas, monospace; }
  .accent { fill: #ff9095; font: 700 16px Consolas, monospace; letter-spacing: 1px; text-transform: uppercase; }
</style>

      <rect class="bg" width="1200" height="760" rx="28"/>
      <text x="72" y="88" class="accent">Topic 18</text>
      <text x="72" y="140" class="title">One request becomes three visibility signals</text>

      <rect x="506" y="214" width="188" height="120" rx="26" class="accent-panel"/>
      <text x="564" y="272" class="accent">Request</text>
      <text x="557" y="314" class="body">live flow</text>
      <rect x="124" y="410" width="180" height="126" rx="26" class="panel"/>
      <text x="189" y="468" class="accent">Logs</text>
      <text x="177" y="510" class="body">events</text>
      <rect x="510" y="410" width="180" height="126" rx="26" class="chip"/>
      <text x="561" y="468" class="accent">Metrics</text>
      <text x="566" y="510" class="body">trends</text>
      <rect x="896" y="410" width="180" height="126" rx="26" class="panel-soft"/>
      <text x="950" y="468" class="accent">Traces</text>
      <text x="956" y="510" class="body">path</text>
      <rect x="460" y="610" width="280" height="92" rx="26" class="panel"/>
      <text x="529" y="662" class="accent">Investigation</text>
      <text x="559" y="694" class="small">find why</text>
