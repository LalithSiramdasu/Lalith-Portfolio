<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" overflow="hidden" role="img" aria-labelledby="t d">
      <title id="t">Resilience is a loop, not a single handler</title><desc id="d">A fault tolerance diagram showing detect, classify, respond, recover, and observe as a repeatable backend loop.</desc>
      <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

<style>
  .bg { fill: #0b1016; }
  .panel { fill: #151b22; stroke: #2c343d; stroke-width: 2; }
  .panel-soft { fill: #11161c; stroke: #27303a; stroke-width: 2; }
  .accent-panel { fill: #1b1013; stroke: #a50008; stroke-width: 2.5; }
  .chip { fill: #151b22; stroke: #46505b; stroke-width: 1.5; }
  .line { stroke: #f0f4fa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .line-muted { stroke: #8d97a2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
  .title { fill: #f4f7fb; font: 700 34px 'Segoe UI', Arial, sans-serif; }
  .body { fill: #e9eef5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
  .small { fill: #aab4bf; font: 500 18px 'Segoe UI', Arial, sans-serif; }
  .mono { fill: #f4f7fb; font: 700 20px Consolas, monospace; }
  .accent { fill: #ff9095; font: 700 16px Consolas, monospace; letter-spacing: 1px; text-transform: uppercase; }
</style>

      <rect class="bg" width="1200" height="760" rx="28"/>
      <text x="72" y="88" class="accent">Topic 16</text>
      <text x="72" y="140" class="title">Resilience is a loop, not a single handler</text>

      <rect x="44" y="302" width="180" height="126" rx="26" class="panel"/>
      <text x="102" y="360" class="accent">Detect</text>
      <text x="99" y="402" class="body">health</text>
      <rect x="272" y="302" width="180" height="126" rx="26" class="chip"/>
      <text x="318" y="360" class="accent">Classify</text>
      <text x="305" y="402" class="body">error type</text>
      <rect x="500" y="272" width="200" height="156" rx="28" class="accent-panel"/>
      <text x="563" y="332" class="accent">Respond</text>
      <text x="586" y="374" class="body">contain</text>
      <text x="547" y="408" class="small">safe boundary</text>
      <rect x="748" y="302" width="180" height="126" rx="26" class="panel"/>
      <text x="806" y="360" class="accent">Recover</text>
      <text x="806" y="402" class="body">recover</text>
      <rect x="976" y="302" width="180" height="126" rx="26" class="panel-soft"/>
      <text x="1037" y="360" class="accent">Observe</text>
      <text x="1027" y="402" class="body">observe</text>
      <path d="M224 365 L272 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M452 365 L500 350" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M700 350 L748 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <path d="M928 365 L976 365" stroke="#f0f4fa" stroke-width="3" fill="none" marker-end="url(#a)"/>
      <rect x="394" y="548" width="412" height="88" rx="24" class="panel"/>
      <text x="492" y="595" class="accent">Global handler</text>
