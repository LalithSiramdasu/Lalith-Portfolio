
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" overflow="hidden" role="img" aria-labelledby="t d">
<title id="t">Serialization cycle</title><desc id="d">A neat four-part serialization and deserialization flow.</desc>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

  <style>
