
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" overflow="hidden" role="img" aria-labelledby="t d">
<title id="t">Routing map</title><desc id="d">Balanced routing diagram with route inputs, router, and handlers.</desc>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#f0f4fa"/></marker></defs>

  <style>
    .bg { fill: #0b1016; }
    .panel { fill: #151b22; stroke: #2c343d; stroke-width: 2; }
    .panel-soft { fill: #11161c; stroke: #27303a; stroke-width: 2; }
    .accent-panel { fill: #1b1013; stroke: #a50008; stroke-width: 2.5; }
    .chip { fill: #151b22; stroke: #46505b; stroke-width: 1.5; }
    .line { stroke: #f0f4fa; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .line-muted { stroke: #8d97a2; stroke-width: 2.5; fill: none; marker-end: url(#arrow-muted); }
    .title { fill: #f4f7fb; font: 700 34px 'Segoe UI', Arial, sans-serif; }
    .body { fill: #e9eef5; font: 600 24px 'Segoe UI', Arial, sans-serif; }
    .small { fill: #aab4bf; font: 500 18px 'Segoe UI', Arial, sans-serif; }
    .mono { fill: #f4f7fb; font: 700 20px Consolas, monospace; }
    .accent { fill: #ff9095; font: 700 16px Consolas, monospace; letter-spacing: 1px; text-transform: uppercase; }
  </style>

<rect class="bg" width="1200" height="760" rx="28"/>
<text x="72" y="88" class="accent">Topic 6</text>
<text x="72" y="140" class="title">Routing matches method and path</text>
<rect x="90" y="185" width="255" height="76" rx="22" class="chip"/><text x="128" y="233" class="mono">GET /api/books</text>
<rect x="90" y="290" width="255" height="76" rx="22" class="chip"/><text x="124" y="338" class="mono">POST /api/books</text>
<rect x="90" y="395" width="255" height="76" rx="22" class="chip"/><text x="111" y="443" class="mono">GET /api/users/:id</text>
<rect x="90" y="500" width="255" height="76" rx="22" class="chip"/><text x="127" y="548" class="small">GET /books?page=2</text>
<rect x="455" y="270" width="290" height="220" rx="32" class="accent-panel"/>
<text x="565" y="332" class="accent">Router</text>
<text x="522" y="387" class="body">match request</text>
<text x="518" y="430" class="body">extract params</text>
<rect x="855" y="185" width="250" height="76" rx="22" class="panel"/><text x="908" y="233" class="mono">listBooks()</text>
<rect x="855" y="290" width="250" height="76" rx="22" class="panel"/><text x="896" y="338" class="mono">createBook()</text>
<rect x="855" y="395" width="250" height="76" rx="22" class="panel"/><text x="914" y="443" class="mono">getUser(id)</text>
<rect x="855" y="500" width="250" height="76" rx="22" class="panel-soft"/><text x="890" y="548" class="mono">listBooks(page)</text>
